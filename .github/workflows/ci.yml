# PR gate — the 406-test backend suite, lint, and the web typecheck/tests run on
# every PR and push to main (metron-ops#25: deploy.yml alone meant the suite ran
# only on developer discipline). Coverage floor pinned at 95% so the measured 97%
# can't silently erode.
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true


permissions: {}
jobs:
  python:
    name: pytest + ruff (api, portfolio_analytics)
    # CodeBuild-managed ephemeral GitHub Actions runner (project metron-runner,
    # arm64/Graviton; cost-I2864 — replaces the self-hosted EC2-spot runner +
    # metron-runner-dispatcher Lambda). actions/setup-python handles the arm64
    # Python 3.12 fetch, so no bootstrap tool-cache pre-provisioning is needed;
    # the web job (Node.js) stays on ubuntu-latest (metron#274).
    runs-on: codebuild-metron-runner-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" ruff
      - name: Ruff
        run: ruff check api portfolio_analytics tests
      - name: Pytest (coverage floor 95%)
        run: pytest tests/ -q --cov=api --cov=portfolio_analytics --cov-fail-under=95

  web:
    name: tsc + lint + vitest (web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npx next lint
      - name: Vitest
        run: npm test
